services:
  - type: web
    name: resumeiq-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py seed_admin"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DJANGO_SECRET_KEY
        value: "resumeiq-production-secret-2025"
      - key: DEBUG
        value: "False"