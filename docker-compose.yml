version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: resumeiq_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost 127.0.0.1 backend
      - CORS_ALLOWED_ORIGINS=http://localhost
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    expose:
      - "8000"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: resumeiq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: resumeiq
      POSTGRES_USER: resumeiq
      POSTGRES_PASSWORD: resumeiq_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: resumeiq_frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: resumeiq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_static:
  backend_media:
